services:
  artifact-server:
    build: .
    container_name: artifact-server
    restart: unless-stopped
    environment:
      - PORT=3333
      - BASE_URL=${BASE_URL:-https://artifacts.kenluu.org}
    ports:
      - "3333:3333"
    volumes:
      - ./artifacts:/app/artifacts
      - ./src:/app/src
      - ./libs.json:/app/libs.json
    labels:
      - traefik.enable=true
      # HTML artifacts — public (no auth) so end users can view
      - traefik.http.routers.artifacts.rule=Host(`artifacts.kenluu.org`) && PathPrefix(`/artifacts`)
      - traefik.http.routers.artifacts.entrypoints=websecure
      - traefik.http.routers.artifacts.tls.certresolver=traefik-main
      - traefik.http.routers.artifacts.priority=3
      # Gallery/root — behind basicauth
      - traefik.http.routers.artifacts-gallery.rule=Host(`artifacts.kenluu.org`)
      - traefik.http.routers.artifacts-gallery.entrypoints=websecure
      - traefik.http.routers.artifacts-gallery.tls.certresolver=traefik-main
      - traefik.http.routers.artifacts-gallery.priority=1
      - traefik.http.routers.artifacts-gallery.middlewares=artifacts-auth
      - traefik.http.services.artifacts.loadbalancer.server.port=3333
      # MCP endpoint with basicauth (for mcpproxy-go)
      - traefik.http.routers.artifacts-mcp.rule=Host(`artifacts.kenluu.org`) && PathPrefix(`/mcp`)
      - traefik.http.routers.artifacts-mcp.entrypoints=websecure
      - traefik.http.routers.artifacts-mcp.tls.certresolver=traefik-main
      - traefik.http.routers.artifacts-mcp.priority=2
      - traefik.http.routers.artifacts-mcp.service=artifacts
      - traefik.http.routers.artifacts-mcp.middlewares=artifacts-auth
      - traefik.http.middlewares.artifacts-auth.basicauth.users=ken:$$apr1$$8Hjiomgl$$Ad42qC.GaNorRD7qTjRAX0
    networks:
      - frontend

networks:
  frontend:
    external: true
